name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_name: retrotls
            asset_name: retrotls-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary_name: retrotls
            asset_name: retrotls-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary_name: retrotls
            asset_name: retrotls-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_name: retrotls.exe
            asset_name: retrotls-windows-x86_64

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross-compilation tools (macOS)
      if: matrix.target == 'aarch64-apple-darwin'
      run: |
        rustup target add aarch64-apple-darwin

    - name: Build release binary
      run: cargo build --release --target ${{ matrix.target }}

    - name: Prepare asset (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        cd target/${{ matrix.target }}/release
        tar czvf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.binary_name }}
        cd ../../..
        echo "ASSET=${{ matrix.asset_name }}.tar.gz" >> $GITHUB_ENV

    - name: Prepare asset (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd target/${{ matrix.target }}/release
        7z a ../../../${{ matrix.asset_name }}.zip ${{ matrix.binary_name }}
        cd ../../..
        echo "ASSET=${{ matrix.asset_name }}.zip" >> $env:GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: ${{ env.ASSET }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
